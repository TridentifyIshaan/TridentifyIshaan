name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to output branch
        run: |
          git fetch origin output --depth=1 2>/dev/null || echo "Output branch does not exist yet"
          git checkout -B output
          mkdir -p dist
          cp -r dist/* . 2>/dev/null || true
          git add dist/github-snake.svg dist/github-snake-dark.svg 2>/dev/null || true
          git commit -m "chore: update snake contribution graph" --allow-empty
          git push origin output -f
