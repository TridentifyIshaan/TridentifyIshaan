name: Monthly Now Building Update

on:
  schedule:
    - cron: "5 1 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      NOW_BUILDING_USERNAME: ${{ vars.NOW_BUILDING_USERNAME }}
      NOW_BUILDING_README_PATH: ${{ vars.NOW_BUILDING_README_PATH }}
      NOW_BUILDING_MONTHS: ${{ vars.NOW_BUILDING_MONTHS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install updater
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Update managed block
        env:
          GITHUB_TOKEN: ${{ secrets.NOW_BUILDING_TOKEN }}
        run: |
          README_PATH="${NOW_BUILDING_README_PATH:-README.md}"
          MONTHS="${NOW_BUILDING_MONTHS:-3}"

          now-building-updater \
            --username "${NOW_BUILDING_USERNAME}" \
            --readme-path "${README_PATH}" \
            --months "${MONTHS}" \
            --include-private

      - name: Commit changes
        run: |
          README_PATH="${NOW_BUILDING_README_PATH:-README.md}"

          if git diff --quiet; then
            echo "No README changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${README_PATH}"
          git commit -m "chore: monthly now building update"
          git push
